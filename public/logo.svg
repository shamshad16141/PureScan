<svg width="40" height="40" viewBox="0 0 40 40" fill="none" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="logoGradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#6366f1;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#8b5cf6;stop-opacity:1" />
    </linearGradient>
  </defs>
  
  <!-- Background circle with gradient -->
  <circle cx="20" cy="20" r="18" fill="url(#logoGradient)" stroke="white" stroke-width="2"/>
  
  <!-- Scanning lines effect -->
  <g stroke="white" stroke-width="1.5" stroke-linecap="round" opacity="0.8">
    <line x1="8" y1="12" x2="32" y2="12" />
    <line x1="8" y1="20" x2="32" y2="20" />
    <line x1="8" y1="28" x2="32" y2="28" />
  </g>
  
  <!-- Central magnifying glass/search icon -->
  <g stroke="white" stroke-width="2" fill="none">
    <circle cx="17" cy="17" r="5"/>
    <line x1="26" y1="26" x2="21" y2="21"/>
  </g>
  
  <!-- Small sparkle/AI indicator -->
  <g fill="white" opacity="0.9">
    <circle cx="28" cy="10" r="1.5"/>
    <circle cx="31" cy="14" r="1"/>
    <circle cx="12" cy="30" r="1"/>
  </g>
</svg>